spring:
  cloud:
    service-registry:
      auto-registration:
        enabled: true
  datasource:
    url: jdbc:h2:mem:clientesdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}

rabbitmq:
  exchange:
    cliente: cliente.exchange
  queue:
    cliente-criado: cliente.criado.ms-clientes.queue
  routing-key:
    cliente-criado: cliente.criado.rk

server:
  port: 8081
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never
    include-exception: false

eureka:
  client:
    enabled: true
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
